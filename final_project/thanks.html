<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Merci — Ma Boutique</title>
    <meta name="description" content="Votre demande d'adhésion a bien été reçue.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="icon" href="images/favicon-32x32.png" sizes="32x32">
    <link rel="stylesheet" href="styles/store-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;800&display=swap" rel="stylesheet">
    <script src="scripts/store1.js" defer></script>
</head>
<body>
    <header>
        <section class="main-header">
            <article class="header-content">
                <div class="image-logo">
                    <a href="index.html">
                        <img src="images/logo.png" alt="Logo Ma Boutique" width="52">
                    </a>
                    <div>
                        <span class="logo">Ma Boutique</span>
                        <p>Acheter, Vendre Simplement !</p>
                    </div>
                </div>
                <nav class="filterButton" id="navlinks" aria-label="Navigation">
                    <button type="button" onclick="window.location.href='index.html'">Accueil</button>
                    <button type="button" onclick="window.location.href='join.html'">Rejoindre</button>
                </nav>
                <button id="toggle-theme" type="button" aria-label="Changer de thème">🌓</button>
            </article>
        </section>
    </header>

    <main style="display:flex;align-items:center;justify-content:center;min-height:60vh;padding:40px 20px">
        <div style="text-align:center;max-width:480px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:48px 32px;box-shadow:var(--shadow)">
            <div style="font-size:4rem;margin-bottom:16px">🎉</div>
            <h1 style="font-size:1.8rem;color:var(--primary-color);margin-bottom:12px">Merci !</h1>
            <p style="color:var(--muted);margin-bottom:8px" id="thankMsg">Votre demande d'adhésion a bien été reçue.</p>
            <p style="color:var(--muted);font-size:.9rem;margin-bottom:28px">Nous vous contacterons dans les 24 heures.</p>
            <a href="index.html" class="btn" style="display:inline-block;padding:12px 28px;font-size:1rem">
                <i class="fas fa-home"></i> Retour à l'accueil
            </a>
        </div>
    </main>

    <footer>
        <div class="footer-note">
            <p>©<span id="currentyear"></span> ❖ Ma Boutique ❖</p>
            <p><span id="lastModified"></span></p>
        </div>
    </footer>

    <script>
        // Affiche le prénom si transmis en GET
        const params = new URLSearchParams(location.search);
        const first = params.get('first');
        if(first){
            document.getElementById('thankMsg').textContent =
                `Merci ${first} ! Votre demande d'adhésion a bien été reçue.`;
        }
    </script>
</body>
</html>
