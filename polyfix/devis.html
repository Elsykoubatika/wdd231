<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestion des Devis — POLYFIX Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/dashboard.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
  <div class="dashboard-layout">
    <aside class="sidebar">
      <a href="index.html" class="sidebar-logo">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        POLY<span>FIX</span>
      </a>
      <nav class="sidebar-nav">
        <a href="dashboard.html">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Tableau de bord
        </a>
        <a href="devis.html" class="active">
          <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          Devis
        </a>
        <a href="projets.html">
          <svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
          Projets
        </a>
        <a href="rh.html">
          <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Ouvriers (RH)
        </a>
        <a href="ai-agent.html">
          <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10H12V2z"/><path d="M12 2a10 10 0 0 1 10 10h-10V2z"/></svg>
          Agent IA
        </a>
      </nav>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <h1 class="page-title">Gestion des Devis</h1>
        <button class="btn-primary" onclick="openModal()">+ Nouveau Devis</button>
      </div>

      <div class="card">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Date</th>
              <th>Client</th>
              <th>Projet</th>
              <th>Montant (FCFA)</th>
              <th>Statut</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="table-devis">
            <!-- Rempli en JS -->
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- Modal Nouveau Devis -->
  <div id="modal-devis" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center;">
    <div style="background:#fff; width:90%; max-width:800px; max-height:90vh; overflow-y:auto; border-radius:12px; padding:32px; position:relative;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
        <h2 style="margin:0; font-family:'Barlow Condensed', sans-serif; font-size:24px; text-transform:uppercase;">Créer un Devis</h2>
        <button onclick="closeModal()" style="background:none; border:none; font-size:24px; cursor:pointer;">&times;</button>
      </div>
      <form id="form-devis">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:24px;">
          <div>
            <label style="font-size:12px; color:#64748B;">Client</label>
            <input type="text" id="dev-client" required style="width:100%; box-sizing:border-box; padding:10px; border:1px solid #E2E8F0; border-radius:6px; margin-top:4px;">
          </div>
          <div>
            <label style="font-size:12px; color:#64748B;">Titre du projet</label>
            <input type="text" id="dev-projet" required style="width:100%; box-sizing:border-box; padding:10px; border:1px solid #E2E8F0; border-radius:6px; margin-top:4px;">
          </div>
        </div>
        
        <h3 style="font-size:15px; margin-bottom:12px; color:#1e293b;">Lignes de devis</h3>
        <div id="lignes-container">
          <div class="ligne-devis" style="display:flex; gap:10px; margin-bottom:10px;">
            <input type="text" placeholder="Description" required style="flex:2; box-sizing:border-box; padding:10px; border:1px solid #E2E8F0; border-radius:6px;">
            <input type="number" placeholder="Qté" value="1" required style="flex:1; box-sizing:border-box; padding:10px; border:1px solid #E2E8F0; border-radius:6px;">
            <input type="number" placeholder="Prix Unitaire (FCFA)" required style="flex:1; box-sizing:border-box; padding:10px; border:1px solid #E2E8F0; border-radius:6px;">
          </div>
        </div>
        <button type="button" onclick="addLigne()" style="background:#f1f5f9; border:none; padding:8px 16px; border-radius:6px; cursor:pointer; font-size:13px; font-weight:600; margin-bottom:24px;">+ Ajouter une ligne</button>
        
        <div style="text-align:right; border-top:1px solid #E2E8F0; padding-top:20px;">
          <button type="button" onclick="closeModal()" style="background:none; border:none; padding:10px 20px; color:#64748b; cursor:pointer; font-weight:600;">Annuler</button>
          <button type="submit" class="btn-primary">Enregistrer & Générer</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/db.js"></script>
  <script src="js/devis.js"></script>
</body>
</html>
