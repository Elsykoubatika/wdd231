<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Admin — POLYFIX</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/dashboard.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="dashboard-layout">
    <aside class="sidebar">
      <a href="index.html" class="sidebar-logo">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        POLY<span>FIX</span>
      </a>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="active">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Tableau de bord
        </a>
        <a href="devis.html">
          <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          Devis
        </a>
        <a href="projets.html">
          <svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
          Projets
        </a>
        <a href="rh.html">
          <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Ouvriers (RH)
        </a>
        <a href="ai-agent.html">
          <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10H12V2z"/><path d="M12 2a10 10 0 0 1 10 10h-10V2z"/></svg>
          Agent IA
        </a>
      </nav>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <h1 class="page-title">Tableau de bord global</h1>
      </div>

      <div class="kpi-grid">
        <div class="kpi-card">
          <div class="kpi-header">
            <h3 class="kpi-title">Projets en cours</h3>
            <div class="kpi-icon"><svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/></svg></div>
          </div>
          <p class="kpi-value" id="kpi-projets">0</p>
        </div>
        <div class="kpi-card">
          <div class="kpi-header">
            <h3 class="kpi-title">Devis en attente</h3>
            <div class="kpi-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg></div>
          </div>
          <p class="kpi-value" id="kpi-devis">0</p>
        </div>
        <div class="kpi-card">
          <div class="kpi-header">
            <h3 class="kpi-title">Chiffre d'Affaires</h3>
            <div class="kpi-icon"><svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div>
          </div>
          <p class="kpi-value" id="kpi-ca" style="font-size:28px">0 FCFA</p>
        </div>
        <div class="kpi-card">
          <div class="kpi-header">
            <h3 class="kpi-title">Ouvriers Actifs</h3>
            <div class="kpi-icon"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div>
          </div>
          <p class="kpi-value" id="kpi-ouvriers">0</p>
        </div>
      </div>

      <div class="content-grid">
        <div class="card">
          <div class="card-header">
            <h2 class="card-title">Évolution Mensuelle du CA (FCFA)</h2>
          </div>
          <canvas id="caChart" height="250"></canvas>
        </div>

        <div class="card">
          <div class="card-header">
            <h2 class="card-title">Projets Récents</h2>
          </div>
          <table>
            <thead>
              <tr>
                <th>Projet</th>
                <th>Statut</th>
              </tr>
            </thead>
            <tbody id="table-projets">
              <!-- JS -->
            </tbody>
          </table>
          <div style="margin-top:20px; text-align:center;">
             <a href="projets.html" style="font-size:13px; font-weight:600; color:#E85A00; text-decoration:none;">Voir tous les projets →</a>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="js/db.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
